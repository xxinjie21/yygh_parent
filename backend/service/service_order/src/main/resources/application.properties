# 服务端口
server.port=8206
# 服务名
spring.application.name=service-order
# 环境配置：dev、test、prod
spring.profiles.active=dev

# MySQL数据库连接
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/yygh_order?characterEncoding=utf-8&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# 返回json的全局时间格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8


# Nacos服务地址
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848

mybatis-plus.mapper-locations=classpath:com/yygh/order/mapper/xml/*.xml

# Redis配置
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=1800000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-wait=-1
# 最大等待时间（负数表示无限制）
spring.redis.lettuce.pool.max-idle=5
spring.redis.lettuce.pool.min-idle=0

# RabbitMQ配置
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# 微信公众号appid
weixin.appid=${WECHAT_APPID}
# 商户号
weixin.partner=${WECHAT_PARTNER}
# APIv3密钥（32位，商户平台设置）
weixin.api-v3-key=${WECHAT_API_V3_KEY}
# 商户证书序列号
weixin.merchant-serial-number=${WECHAT_MERCHANT_SERIAL_NUMBER}
# 商户API私钥路径
weixin.private-key-path=classpath:cert/apiclient_key.pem
# 支付回调通知地址
weixin.notify-url=${WECHAT_PAY_NOTIFY_URL}

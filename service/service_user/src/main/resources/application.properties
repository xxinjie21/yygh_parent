# 服务端口
server.port=8160
# 服务名
spring.application.name=service-user

# 环境配置：dev、test、prod
spring.profiles.active=dev

# mysql数据库连接
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/yygh_user?characterEncoding=utf-8&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

#返回json的全局时间格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8


# nacos服务地址
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848

#设置mapper xml文件的位置
mybatis-plus.mapper-locations=classpath:com/yygh/user/mapper/xml/*.xml

#redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database= 0
spring.redis.timeout=1800000

# RabbitMQ配置
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=manual

wx.open.app_id=${WECHAT_OPEN_APP_ID}
wx.open.app_secret=${WECHAT_OPEN_APP_SECRET}
wx.open.redirect_url=${WECHAT_OPEN_REDIRECT_URL:http://localhost:8160/api/ucenter/wx/callback}
yygh.baseUrl=http://localhost:3000
